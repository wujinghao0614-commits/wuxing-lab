{% extends "base.html" %}

{% block body %}
<div class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 space-y-6">
        <div class="text-center">
            <div class="text-4xl mb-2">🔮</div>
            <h2 class="text-2xl font-bold text-green-600">注册账号</h2>
            <p class="text-gray-500 text-sm mt-1">创建你的五行纪账户</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 rounded-lg {% if category == 'error' %}bg-red-100 border border-red-400 text-red-700{% else %}bg-green-100 border border-green-400 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/register" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                       placeholder="输入用户名">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition"
                       placeholder="输入密码">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                注册
            </button>
        </form>
        
        <div class="text-center pt-2">
            <a href="{{ url_for('index') }}" class="text-green-600 hover:text-green-500 text-sm">
                已有账户？点击登录
            </a>
        </div>
        
        <div class="text-center pt-2">
            <a href="/" class="text-gray-500 hover:text-gray-400 text-sm">
                ← 返回首页
            </a>
        </div>
    </div>
</div>
{% endblock %}
